services:
  webapp:
    container_name: webapp
    build:
      context: ./www/webapp
      dockerfile: .docker/prod.Dockerfile
    env_file: .env.local
    volumes:
      - ./www/webapp/src:/app/src
      - ./www/webapp/public:/app/public
    restart: always
    ports:
      - 3000:3000
    networks:
      - front-tier
      - back-tier
    command: bun run start
    depends_on:
      - postgres
  postgres:
    image: postgres
    container_name: prod-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: production-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    networks:
      - back-tier

networks:
  front-tier:
    external: false
  back-tier:
    external: false

volumes:
  db-data:
    driver: flocker
    external: false